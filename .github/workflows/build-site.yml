name: Build site
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/build-site.yml'
  pull_request:
    paths:
      - 'site/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: site
        run: |
          npm install --no-audit --no-fund
          npm run build
